<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pony Bedroom</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #f2e6e1;
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
    }

    #game-shell {
      width: min(100vw, 1200px);
      aspect-ratio: 3 / 2;
      box-shadow: 0 24px 60px rgba(56, 33, 27, 0.22);
      border: 8px solid rgba(255, 255, 255, 0.65);
      border-radius: 18px;
      overflow: hidden;
      background: #fffaf7;
    }
  </style>
</head>
<body>
  <div id="game-shell"></div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="./game.js"></script>
</body>
</html>
